<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CAS</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0e0e0e;
  --surface:   #161616;
  --border:    #2a2a2a;
  --text:      #c8c8c8;
  --text-dim:  #666;
  --accent:    #4a9eff;
  --user-bg:   #1a1a2e;
  --shell-bg:  #1a1a1a;
  --tab-bg:    #111;
  --tab-active:#1a1a1a;
  --mono:      "SF Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--mono); font-size: 13px; line-height: 1.5; }

#app { display: flex; flex-direction: column; height: 100%; }

#topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 8px 16px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; position: relative;
}
#topbar .label { font-weight: 700; font-size: 14px; letter-spacing: .05em; color: var(--accent); }
#topbar .meta  { color: var(--text-dim); font-size: 11px; }
#topbar .spacer { flex: 1; }

/* New session button */
#new-session-btn {
  padding: 2px 8px; background: none; border: 1px solid var(--border);
  border-radius: 3px; color: var(--text-dim); font-family: var(--mono);
  font-size: 13px; cursor: pointer; transition: border-color .15s, color .15s;
  line-height: 1.4;
}
#new-session-btn:hover { border-color: var(--accent); color: var(--accent); }
#new-session-btn title { display: none; }

/* Profile button */
#profile-btn {
  padding: 2px 8px; background: none; border: 1px solid var(--border);
  border-radius: 3px; color: var(--text-dim); font-family: var(--mono);
  font-size: 11px; cursor: pointer; transition: border-color .15s, color .15s;
}
#profile-btn:hover { border-color: var(--text-dim); color: var(--text); }
#profile-btn.active { border-color: var(--accent); color: var(--accent); }

/* Profile overlay */
#profile-overlay {
  display: none; position: absolute; top: calc(100% + 4px); right: 12px;
  width: 340px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; z-index: 200; padding: 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,.6); font-size: 12px;
}
#profile-overlay.open { display: block; }
#profile-overlay h4 {
  font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-dim); margin-bottom: 10px;
}
#profile-context {
  color: var(--text); line-height: 1.6; margin-bottom: 12px;
  padding: 8px 10px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 4px; min-height: 36px;
}
#profile-context.empty { color: var(--text-dim); font-style: italic; }
.profile-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px;
}
.profile-stat {
  padding: 6px 8px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 3px;
}
.profile-stat-val { font-size: 16px; font-weight: 700; color: var(--accent); }
.profile-stat-lbl { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.profile-types { margin-bottom: 10px; }
.profile-type-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 3px 0; border-bottom: 1px solid #1a1a1a; font-size: 11px;
}
.profile-type-row:last-child { border-bottom: none; }
.profile-type-bar {
  height: 3px; background: var(--accent); border-radius: 2px; margin-top: 2px;
  opacity: .4;
}
#profile-reset-btn {
  font-size: 10px; color: var(--text-dim); background: none; border: none;
  cursor: pointer; padding: 0; text-decoration: underline; float: right;
}
#profile-reset-btn:hover { color: #c44; }

#panels { display: flex; flex: 1; min-height: 0; }

#chat-panel {
  display: flex; flex-direction: column;
  width: 420px; min-width: 300px; max-width: 480px;
  border-right: 1px solid var(--border); flex-shrink: 0;
}
#chat-history { flex: 1; overflow-y: auto; padding: 12px 16px; }

.msg { padding: 8px 12px; margin-bottom: 8px; border-radius: 4px;
  white-space: pre-wrap; word-wrap: break-word; }
.msg.user  { background: var(--user-bg);  border-left: 2px solid var(--accent); }
.msg.shell { background: var(--shell-bg); border-left: 2px solid var(--border); }
.msg.shell.restored { opacity: .65; }
.msg .role { font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-dim); margin-bottom: 2px; }
.msg.streaming { opacity: .85; }

.cursor::after { content: '▋'; animation: blink .7s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

.msg-divider {
  text-align: center; font-size: 10px; color: var(--text-dim);
  margin: 8px 0; letter-spacing: .06em;
}

#chat-input-area {
  display: flex; gap: 8px; padding: 12px 16px;
  border-top: 1px solid var(--border); background: var(--surface);
}
#chat-input {
  flex: 1; padding: 8px 12px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); font-family: var(--mono); font-size: 13px;
  resize: none; outline: none;
}
#chat-input:focus { border-color: var(--accent); }
#send-btn {
  padding: 8px 16px; background: var(--accent); color: #000;
  border: none; border-radius: 4px; font-family: var(--mono);
  font-size: 13px; font-weight: 600; cursor: pointer;
}
#send-btn:hover    { opacity: .85; }
#send-btn:disabled { opacity: .4; cursor: default; }

#workspace-panel { display: flex; flex-direction: column; flex: 1; min-width: 0; }
#workspace-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text-dim); font-size: 12px;
  padding: 24px; text-align: center;
}
#workspace-active { display: none; flex-direction: column; height: 100%; }

#ws-tabs {
  display: flex; align-items: stretch;
  background: var(--tab-bg); border-bottom: 1px solid var(--border);
  overflow-x: auto; flex-shrink: 0; min-height: 34px;
}
#ws-tabs::-webkit-scrollbar { height: 3px; }
#ws-tabs::-webkit-scrollbar-thumb { background: var(--border); }

.ws-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px; min-width: 110px; max-width: 200px;
  border-right: 1px solid var(--border); cursor: pointer;
  font-size: 11px; color: var(--text-dim); white-space: nowrap;
  background: var(--tab-bg); transition: background .1s, color .1s; flex-shrink: 0;
}
.ws-tab:hover { background: #151515; color: var(--text); }
.ws-tab.active { background: var(--tab-active); color: var(--text); border-bottom: 2px solid var(--accent); }
.ws-tab-badge {
  font-size: 9px; text-transform: uppercase; letter-spacing: .05em;
  padding: 1px 4px; border-radius: 2px; border: 1px solid var(--border);
  color: var(--text-dim); flex-shrink: 0;
}
.ws-tab-badge.document { border-color: #2a4a7f; color: #4a9eff; }
.ws-tab-badge.code     { border-color: #2a5a2a; color: #4aaf4a; }
.ws-tab-badge.list     { border-color: #5a4a2a; color: #af8a4a; }
.ws-tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.ws-tab-close {
  font-size: 14px; line-height: 1; color: var(--text-dim);
  background: none; border: none; cursor: pointer; padding: 0 2px; opacity: 0;
}
.ws-tab:hover .ws-tab-close { opacity: 1; }
.ws-tab-close:hover { color: #c44; }

#ws-toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
#ws-type { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); }

.ws-btn {
  padding: 3px 10px; background: none; border: 1px solid var(--border);
  border-radius: 3px; color: var(--text-dim); font-family: var(--mono);
  font-size: 11px; cursor: pointer; transition: border-color .15s, color .15s;
}
.ws-btn:hover   { border-color: var(--text-dim); color: var(--text); }
.ws-btn.active  { border-color: var(--accent); color: var(--accent); }
.ws-btn.danger:hover { border-color: #c44; color: #c44; }
.ws-btn:disabled { opacity: .4; cursor: default; }

#export-wrap { position: relative; }
#export-menu {
  display: none; position: absolute; top: calc(100% + 4px); right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; z-index: 100; min-width: 130px;
  box-shadow: 0 4px 12px rgba(0,0,0,.5);
}
#export-menu.open { display: block; }
#export-menu a {
  display: block; padding: 7px 14px; font-size: 11px;
  color: var(--text-dim); text-decoration: none; font-family: var(--mono);
}
#export-menu a:hover { background: #1e1e1e; color: var(--text); }

#ws-render { flex: 1; overflow-y: auto; display: block; position: relative; }
#ws-edit   { display: none; flex: 1; flex-direction: column; }
#ws-content {
  flex: 1; padding: 24px 32px; background: var(--bg); color: var(--text);
  font-family: var(--mono); font-size: 13px; line-height: 1.7;
  overflow-y: auto; resize: none; border: none; outline: none;
  white-space: pre-wrap; word-wrap: break-word;
}

/* Code edit mode overrides */
#ws-content.code-mode {
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.55;
  padding: 16px 24px;
  tab-size: 2;
  -moz-tab-size: 2;
}
#ws-content.doc-mode {
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.8;
  padding: 24px 40px;
}

#ws-stream-overlay {
  display: none; position: absolute; inset: 0;
  padding: 24px 32px; overflow-y: auto;
  font-family: var(--mono); font-size: 13px; line-height: 1.7;
  color: var(--text-dim); white-space: pre-wrap; word-wrap: break-word;
  background: var(--bg);
}
#ws-stream-overlay.active { display: block; }

#ws-status {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 16px; border-top: 1px solid var(--border);
  background: var(--surface); font-size: 10px; color: var(--text-dim); flex-shrink: 0;
}
#ws-status-text { flex: 1; }
#ws-status.warning #ws-status-text { color: #e8c840; }
#cancel-btn {
  display: none; padding: 1px 8px; background: none;
  border: 1px solid var(--border); border-radius: 3px;
  color: var(--text-dim); font-family: var(--mono); font-size: 10px;
  cursor: pointer; transition: border-color .15s, color .15s;
}
#cancel-btn:hover { border-color: #c44; color: #c44; }
#cancel-btn.visible { display: inline-block; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #444; }
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <span class="label">CAS</span>
    <span class="meta" id="session-id">no session</span>
    <span class="spacer"></span>
    <button id="new-session-btn" title="Start a new session">+</button>
    <button id="profile-btn" title="Conductor profile">~</button>

    <div id="profile-overlay">
      <h4>Conductor <button id="profile-reset-btn">reset</button></h4>
      <div id="profile-context" class="empty">no context yet</div>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-val" id="ps-sessions">0</div>
          <div class="profile-stat-lbl">sessions</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val" id="ps-workspaces">0</div>
          <div class="profile-stat-lbl">workspaces</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val" id="ps-messages">0</div>
          <div class="profile-stat-lbl">messages</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val" id="ps-edits">0</div>
          <div class="profile-stat-lbl">edits</div>
        </div>
      </div>
      <div id="ps-types-section" style="display:none">
        <h4 style="margin-bottom:6px">workspace types</h4>
        <div class="profile-types" id="ps-ws-types"></div>
        <h4 style="margin-bottom:6px;margin-top:10px">doc topics</h4>
        <div class="profile-types" id="ps-doc-types"></div>
      </div>
    </div>
  </div>

  <div id="panels">
    <div id="chat-panel">
      <div id="chat-history"></div>
      <div id="chat-input-area">
        <textarea id="chat-input" rows="1" placeholder="Type a message..."></textarea>
        <button id="send-btn">Send</button>
      </div>
    </div>

    <div id="workspace-panel">
      <div id="workspace-empty">
        Ask the chat to create a workspace.<br><br>
        <span style="color:#333">write a proposal &nbsp;·&nbsp; create a python script &nbsp;·&nbsp; make a todo list</span>
      </div>

      <div id="workspace-active">
        <div id="ws-tabs"></div>

        <div id="ws-toolbar">
          <span id="ws-type">document</span>
          <button class="ws-btn" id="ws-view-btn">view</button>
          <button class="ws-btn" id="ws-edit-btn">edit</button>
          <button class="ws-btn" id="ws-undo-btn" title="Undo last change">undo</button>
          <div style="flex:1"></div>
          <div id="export-wrap">
            <button class="ws-btn" id="ws-export-btn">export ▾</button>
            <div id="export-menu">
              <a href="#" data-fmt="md">Markdown / code</a>
              <a href="#" data-fmt="html">HTML (.html)</a>
              <a href="#" data-fmt="txt">Plain text (.txt)</a>
            </div>
          </div>
          <button class="ws-btn danger" id="ws-close-btn">close</button>
        </div>

        <div id="ws-render">
          <div id="ws-stream-overlay"></div>
        </div>
        <div id="ws-edit"><textarea id="ws-content" spellcheck="false"></textarea></div>
        <div id="ws-status">
          <span id="ws-status-text">ready</span>
          <button id="cancel-btn" title="Cancel generation">cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  let sessionId   = null;
  let workspaces  = {};
  let activeId    = null;
  let isEditMode  = false;
  let cssInjected = false;
  let saveTimer   = null;
  let streaming   = false;
  const SAVE_MS   = 1000;

  const $history      = document.getElementById("chat-history");
  const $input        = document.getElementById("chat-input");
  const $sendBtn      = document.getElementById("send-btn");
  const $sessionId    = document.getElementById("session-id");
  const $newSessionBtn = document.getElementById("new-session-btn");
  const $wsEmpty      = document.getElementById("workspace-empty");
  const $wsActive     = document.getElementById("workspace-active");
  const $wsTabs       = document.getElementById("ws-tabs");
  const $wsType       = document.getElementById("ws-type");
  const $wsRender     = document.getElementById("ws-render");
  const $wsOverlay    = document.getElementById("ws-stream-overlay");
  const $wsEdit       = document.getElementById("ws-edit");
  const $wsContent    = document.getElementById("ws-content");
  const $wsStatus     = document.getElementById("ws-status");
  const $wsStatusText = document.getElementById("ws-status-text");
  const $cancelBtn    = document.getElementById("cancel-btn");
  const $wsViewBtn    = document.getElementById("ws-view-btn");
  const $wsEditBtn    = document.getElementById("ws-edit-btn");
  const $wsUndoBtn    = document.getElementById("ws-undo-btn");
  const $wsCloseBtn   = document.getElementById("ws-close-btn");
  const $wsExportBtn  = document.getElementById("ws-export-btn");
  const $exportMenu   = document.getElementById("export-menu");

  const $profileBtn      = document.getElementById("profile-btn");
  const $profileOverlay  = document.getElementById("profile-overlay");
  const $profileContext  = document.getElementById("profile-context");
  const $profileReset    = document.getElementById("profile-reset-btn");

  // ── REST ─────────────────────────────────────────────
  async function api(method, path, body) {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch("/api/cas" + path, opts);
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || res.statusText); }
    return res.json();
  }

  async function fetchHtml(path) {
    const res = await fetch("/api/cas" + path);
    if (!res.ok) throw new Error(res.statusText);
    return res.text();
  }

  async function ensureCss() {
    if (cssInjected) return;
    try {
      const css = await (await fetch("/api/cas/styles/workspace.css")).text();
      const el = document.createElement("style"); el.textContent = css;
      document.head.appendChild(el); cssInjected = true;
    } catch(e) {}
  }

  // ── Profile overlay ───────────────────────────────────
  async function loadProfile() {
    try {
      const p = await api("GET", "/profile");

      // Context string
      if (p.context) {
        $profileContext.textContent = p.context;
        $profileContext.classList.remove("empty");
      } else {
        $profileContext.textContent = "no context yet — keep using CAS";
        $profileContext.classList.add("empty");
      }

      // Stats
      document.getElementById("ps-sessions").textContent   = p.session_count || 0;
      document.getElementById("ps-workspaces").textContent = p.workspace_count || 0;
      document.getElementById("ps-messages").textContent   = p.message_count || 0;
      document.getElementById("ps-edits").textContent      = p.edit_count || 0;

      // Type breakdowns
      const wsTypes  = p.ws_types || {};
      const docTypes = p.doc_types || {};
      const hasTypes = Object.keys(wsTypes).length || Object.keys(docTypes).length;
      const $section = document.getElementById("ps-types-section");
      $section.style.display = hasTypes ? "block" : "none";

      function renderTypeRows(containerId, counts) {
        const $el = document.getElementById(containerId);
        $el.innerHTML = "";
        const total = Object.values(counts).reduce((a,b) => a+b, 0) || 1;
        Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([k,v]) => {
          const pct = Math.round(v / total * 100);
          const row = document.createElement("div");
          row.className = "profile-type-row";
          row.innerHTML = `<span>${k}</span><span style="color:var(--text-dim)">${v}×</span>`;
          const bar = document.createElement("div");
          bar.className = "profile-type-bar";
          bar.style.width = pct + "%";
          $el.appendChild(row);
          $el.appendChild(bar);
        });
      }

      renderTypeRows("ps-ws-types", wsTypes);
      renderTypeRows("ps-doc-types", docTypes);

    } catch(e) { /* non-fatal */ }
  }

  $profileBtn.addEventListener("click", e => {
    e.stopPropagation();
    const open = $profileOverlay.classList.toggle("open");
    $profileBtn.classList.toggle("active", open);
    if (open) loadProfile();
  });

  $profileReset.addEventListener("click", async e => {
    e.stopPropagation();
    if (!confirm("Reset conductor profile? This clears all learned patterns.")) return;
    await api("DELETE", "/profile");
    loadProfile();
  });

  document.addEventListener("click", e => {
    if (!$profileOverlay.contains(e.target) && e.target !== $profileBtn) {
      $profileOverlay.classList.remove("open");
      $profileBtn.classList.remove("active");
    }
  });

  // ── Tabs ─────────────────────────────────────────────
  function rebuildTabs() {
    $wsTabs.innerHTML = "";
    Object.keys(workspaces).forEach(id => {
      const ws = workspaces[id];
      const tab = document.createElement("div");
      tab.className = "ws-tab" + (id === activeId ? " active" : "");

      const badge = document.createElement("span");
      badge.className = "ws-tab-badge " + (ws.type || "document");
      badge.textContent = (ws.type || "doc").slice(0, 4);

      const title = document.createElement("span");
      title.className = "ws-tab-title"; title.textContent = ws.title; title.title = ws.title;

      const x = document.createElement("button");
      x.className = "ws-tab-close"; x.textContent = "×";
      x.addEventListener("click", e => { e.stopPropagation(); closeWorkspaceById(id); });

      tab.appendChild(badge); tab.appendChild(title); tab.appendChild(x);
      tab.addEventListener("click", () => switchTo(id));
      $wsTabs.appendChild(tab);
    });
  }

  function switchTo(id) {
    if (!workspaces[id]) return;
    if (isEditMode && activeId && activeId !== id) { clearTimeout(saveTimer); saveContent(activeId); }
    activeId = id;
    const ws = workspaces[id];
    $wsType.textContent = ws.type || "document";
    $wsContent.value = ws.content;
    $wsStatus.textContent = ws.is_active ? "ready" : "closed";
    $wsContent.readOnly = !ws.is_active;
    rebuildTabs(); setMode("view");
  }

  function setMode(mode) {
    isEditMode = (mode === "edit");
    if (isEditMode) {
      $wsRender.style.display = "none"; $wsEdit.style.display = "flex";
      $wsViewBtn.classList.remove("active"); $wsEditBtn.classList.add("active");
      // Adapt textarea to workspace type
      const ws = activeId ? workspaces[activeId] : null;
      const isCode = ws && ws.type === "code";
      $wsContent.classList.toggle("code-mode", isCode);
      $wsContent.classList.toggle("doc-mode", !isCode);
      $wsContent.spellcheck = !isCode;
      $wsContent.focus();
    } else {
      $wsRender.style.display = "block"; $wsEdit.style.display = "none";
      $wsViewBtn.classList.add("active"); $wsEditBtn.classList.remove("active");
      if (!streaming) refreshRender();
    }
  }

  async function refreshRender() {
    if (!activeId) return;
    try {
      const prev = $wsRender.querySelector(".cas-doc,.cas-code,.cas-list");
      if (prev) prev.remove();
      const html = await fetchHtml("/workspace/" + activeId + "/render");
      $wsOverlay.classList.remove("active");
      const tmp = document.createElement("div"); tmp.innerHTML = html;
      $wsRender.appendChild(tmp.firstChild);
    } catch(e) {}
  }

  function showPanel() { $wsEmpty.style.display = "none"; $wsActive.style.display = "flex"; }
  function hidePanel() { $wsEmpty.style.display = "flex"; $wsActive.style.display = "none"; }

  async function registerWorkspace(ws) {
    await ensureCss();
    workspaces[ws.id] = ws; activeId = ws.id;
    showPanel(); switchTo(ws.id);
  }

  function overlayOpen() {
    const prev = $wsRender.querySelector(".cas-doc,.cas-code,.cas-list");
    if (prev) prev.remove();
    $wsOverlay.textContent = "";
    $wsOverlay.classList.add("active");
    showPanel(); $wsActive.style.display = "flex";
  }

  function overlayAppend(token) {
    $wsOverlay.textContent += token;
    $wsOverlay.scrollTop = $wsOverlay.scrollHeight;
  }

  function overlayClose() { $wsOverlay.classList.remove("active"); }

  // ── Chat bubbles ──────────────────────────────────────
  function appendMsg(role, text, restored) {
    const div = document.createElement("div");
    div.className = "msg " + role + (restored ? " restored" : "");
    const lbl = document.createElement("div"); lbl.className = "role";
    lbl.textContent = role === "user" ? "you" : "cas";
    const body = document.createElement("div"); body.textContent = text;
    div.appendChild(lbl); div.appendChild(body);
    $history.appendChild(div); $history.scrollTop = $history.scrollHeight;
    return body;
  }

  function appendStreamBubble() {
    const div = document.createElement("div"); div.className = "msg shell streaming";
    const lbl = document.createElement("div"); lbl.className = "role"; lbl.textContent = "cas";
    const body = document.createElement("div"); body.className = "cursor";
    div.appendChild(lbl); div.appendChild(body);
    $history.appendChild(div); $history.scrollTop = $history.scrollHeight;
    return { div, body };
  }

  // ── Page load restore ─────────────────────────────────
  async function init() {
    try {
      const list = await api("GET", "/workspaces");
      if (list.length) {
        await ensureCss();
        list.forEach(ws => { workspaces[ws.id] = ws; });
        activeId = list[list.length - 1].id;
        showPanel(); switchTo(activeId);
      }
    } catch(e) {}

    try {
      const data = await api("GET", "/session/latest");
      if (data.session_id && data.messages.length) {
        sessionId = data.session_id;
        $sessionId.textContent = "session " + sessionId;
        data.messages.forEach(m => appendMsg(m.role === "user" ? "user" : "shell", m.text, true));
        // Only add divider if there are messages worth dividing
        if (data.messages.length > 0) {
          const divider = document.createElement("div");
          divider.className = "msg-divider";
          divider.textContent = "─── session resumed ───";
          $history.appendChild(divider);
          $history.scrollTop = $history.scrollHeight;
        }
      } else if (data.session_id) {
        sessionId = data.session_id;
        $sessionId.textContent = "session " + sessionId;
      }
    } catch(e) {}
  }

  // ── Streaming send ────────────────────────────
  let abortController = null;

  function setStatus(text, warn) {
    $wsStatusText.textContent = text;
    $wsStatus.classList.toggle("warning", !!warn);
  }

  function streamStart() {
    streaming = true;
    $sendBtn.disabled = true;
    $cancelBtn.classList.add("visible");
  }

  function streamEnd() {
    streaming = false;
    $sendBtn.disabled = false;
    $cancelBtn.classList.remove("visible");
    $wsStatus.classList.remove("warning");
    abortController = null;
    $input.focus();
  }

  async function sendMessage() {
    const text = $input.value.trim(); if (!text || streaming) return;
    $input.value = ""; autoResize();
    appendMsg("user", text);
    streamStart();

    const { div: bubbleDiv, body: bubbleBody } = appendStreamBubble();
    let isWsIntent = false, chatTokenBuf = "";
    let elapsedSec = 0, elapsedInterval = null, tokenReceived = false;

    function startTimer(baseLabel) {
      elapsedSec = 0; tokenReceived = false;
      elapsedInterval = setInterval(() => {
        elapsedSec++;
        setStatus(baseLabel + " " + elapsedSec + "s",
          elapsedSec >= 30 && !tokenReceived);
        if (elapsedSec === 30 && !tokenReceived) {
          setStatus("model is loading, please wait… " + elapsedSec + "s", true);
        }
      }, 1000);
    }

    function stopTimer() {
      if (elapsedInterval) { clearInterval(elapsedInterval); elapsedInterval = null; }
    }

    abortController = new AbortController();

    try {
      const resp = await fetch("/api/cas/message/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
        signal: abortController.signal,
      });
      if (!resp.ok) throw new Error(await resp.text());

      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = "", lastEvent = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const parts = buf.split("\n\n");
        buf = parts.pop();

        for (const block of parts) {
          const lines = block.split("\n");
          let event = lastEvent, data = null;
          for (const line of lines) {
            if (line.startsWith("event: ")) event = line.slice(7).trim();
            else if (line.startsWith("data: ")) data = line.slice(6);
          }
          lastEvent = "";
          if (!data) { lastEvent = event; continue; }
          let parsed;
          try { parsed = JSON.parse(data); } catch(e) { continue; }

          if (event === "session") {
            sessionId = parsed.session_id;
            $sessionId.textContent = "session " + sessionId;
          } else if (event === "intent") {
            if (parsed.kind === "create_workspace" || parsed.kind === "edit_workspace") {
              isWsIntent = true;
              await ensureCss();
              overlayOpen();
              const baseLabel = parsed.kind === "create_workspace"
                ? "generating " + (parsed.ws_type || "document") + "…"
                : "updating…";
              setStatus(baseLabel);
              startTimer(baseLabel);
            }
          } else if (event === "token") {
            tokenReceived = true;
            $wsStatus.classList.remove("warning");
            const tok = parsed.token || "";
            if (isWsIntent) { overlayAppend(tok); }
            else { chatTokenBuf += tok; bubbleBody.textContent = chatTokenBuf; $history.scrollTop = $history.scrollHeight; }
          } else if (event === "workspace") {
            stopTimer();
            overlayClose();
            await registerWorkspace(parsed);
            $wsContent.value = parsed.content;
            await refreshRender();
            setStatus("ready");
          } else if (event === "chat_reply") {
            stopTimer();
            const replyText = parsed.text || chatTokenBuf;
            bubbleDiv.classList.remove("streaming"); bubbleBody.classList.remove("cursor");
            bubbleBody.textContent = replyText; $history.scrollTop = $history.scrollHeight;
          } else if (event === "done") {
            break;
          }
        }
      }
    } catch(err) {
      stopTimer();
      bubbleDiv.classList.remove("streaming"); bubbleBody.classList.remove("cursor");
      if (err.name === "AbortError") {
        bubbleBody.textContent = "Cancelled.";
        setStatus("cancelled");
      } else {
        bubbleBody.textContent = "Error: " + err.message;
        setStatus("error");
      }
      overlayClose();
    }
    streamEnd();
  }

  $cancelBtn.addEventListener("click", () => {
    if (abortController) { abortController.abort(); }
  });

  // ── Workspace management ──────────────────────────────
  async function closeWorkspaceById(id) {
    try {
      await api("DELETE", "/workspace/" + id); delete workspaces[id];
      const ids = Object.keys(workspaces);
      if (!ids.length) { activeId = null; hidePanel(); }
      else { activeId = ids[ids.length-1]; showPanel(); switchTo(activeId); }
      rebuildTabs(); appendMsg("shell", "Workspace closed.");
    } catch(err) { appendMsg("shell", "Error: " + err.message); }
  }

  // ── Undo ─────────────────────────────────────────────
  async function undoWorkspace() {
    if (!activeId || streaming) return;
    $wsUndoBtn.disabled = true;
    $wsStatus.textContent = "undoing...";
    try {
      const ws = await api("POST", "/workspace/" + activeId + "/undo");
      workspaces[activeId] = ws;
      $wsContent.value = ws.content;
      $wsStatus.textContent = "undo applied";
      if (!isEditMode) refreshRender();
      appendMsg("shell", "Undo applied to \"" + ws.title + "\".");
    } catch(e) {
      $wsStatus.textContent = e.message.includes("No history") ? "nothing to undo" : "undo failed";
    }
    $wsUndoBtn.disabled = false;
  }

  // ── Export ───────────────────────────────────────────
  function triggerExport(fmt) {
    if (!activeId) return;
    window.location.href = "/api/cas/workspace/" + activeId + "/export/" + fmt;
    $exportMenu.classList.remove("open");
  }
  $wsExportBtn.addEventListener("click", e => { e.stopPropagation(); $exportMenu.classList.toggle("open"); });
  document.querySelectorAll("#export-menu a").forEach(a => {
    a.addEventListener("click", e => { e.preventDefault(); triggerExport(a.dataset.fmt); });
  });
  document.addEventListener("click", () => $exportMenu.classList.remove("open"));

  // ── Save ─────────────────────────────────────────────
  function onContentEdit() {
    if (!activeId) return;
    $wsStatus.textContent = "editing...";
    clearTimeout(saveTimer); saveTimer = setTimeout(() => saveContent(activeId), SAVE_MS);
  }
  async function saveContent(id) {
    if (!id || !workspaces[id]) return;
    const content = id === activeId ? $wsContent.value : workspaces[id].content;
    $wsStatus.textContent = "saving...";
    try {
      const ws = await api("PUT", "/workspace/" + id, { content });
      workspaces[id] = ws; if (id === activeId) $wsStatus.textContent = "saved";
    } catch(e) { if (id === activeId) $wsStatus.textContent = "save failed"; }
  }

  function autoResize() {
    $input.style.height = "auto";
    $input.style.height = Math.min($input.scrollHeight, 120) + "px";
  }

  // ── New session ──────────────────────────────────────
  async function newSession() {
    if (streaming) return;
    if ($history.children.length > 0) {
      if (!confirm("Start a new session? Current chat history will remain visible but a fresh session will begin.")) return;
    }
    $newSessionBtn.disabled = true;
    try {
      const data = await api("POST", "/session");
      sessionId = data.session_id;
      $sessionId.textContent = "session " + sessionId;
      const divider = document.createElement("div");
      divider.className = "msg-divider";
      divider.textContent = "─── new session ───";
      $history.appendChild(divider);
      $history.scrollTop = $history.scrollHeight;
    } catch(e) {
      console.error("Failed to create new session:", e);
    } finally {
      $newSessionBtn.disabled = false;
    }
  }

  // ── Events ───────────────────────────────────────────
  $sendBtn.addEventListener("click", sendMessage);
  $input.addEventListener("keydown", e => { if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} });
  $input.addEventListener("input", autoResize);
  $wsContent.addEventListener("input", onContentEdit);
  $wsContent.addEventListener("keydown", e => {
    if (e.key !== "Tab") return;
    e.preventDefault();
    const start = $wsContent.selectionStart;
    const end   = $wsContent.selectionEnd;
    const val   = $wsContent.value;
    const indent = "  ";  // 2 spaces

    if (start === end) {
      // No selection — insert indent at cursor
      $wsContent.value = val.slice(0, start) + indent + val.slice(end);
      $wsContent.selectionStart = $wsContent.selectionEnd = start + indent.length;
    } else {
      // Selection — indent/dedent each selected line
      const lineStart = val.lastIndexOf("\n", start - 1) + 1;
      const lineEnd   = val.indexOf("\n", end);
      const block     = val.slice(lineStart, lineEnd === -1 ? undefined : lineEnd);
      const lines     = block.split("\n");
      const shifted   = e.shiftKey
        ? lines.map(l => l.startsWith(indent) ? l.slice(indent.length) : l.replace(/^ /, ""))
        : lines.map(l => indent + l);
      const newBlock  = shifted.join("\n");
      $wsContent.value = val.slice(0, lineStart) + newBlock + (lineEnd === -1 ? "" : val.slice(lineEnd));
      $wsContent.selectionStart = lineStart;
      $wsContent.selectionEnd   = lineStart + newBlock.length;
    }
    onContentEdit();
  });
  $wsViewBtn.addEventListener("click", () => { if (isEditMode) { clearTimeout(saveTimer); saveContent(activeId).then(()=>setMode("view")); } });
  $wsEditBtn.addEventListener("click", () => { if (!isEditMode) setMode("edit"); });
  $wsUndoBtn.addEventListener("click", undoWorkspace);
  $wsCloseBtn.addEventListener("click", () => { if (activeId) closeWorkspaceById(activeId); });
  $newSessionBtn.addEventListener("click", newSession);

  setMode("view"); $input.focus(); init();
})();
</script>
</body>
</html>
