<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .arr { stroke: #888780; stroke-width: 1.5; }
    /* Blue */
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }
    /* Coral */
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .th { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }
    /* Teal */
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }
    /* Gray */
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .th { fill: #2C2C2A; }
    .c-gray .ts { fill: #5F5E5A; }
    marker path { stroke: #888780; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text class="th" x="340" y="30" text-anchor="middle" fill="#2C2C2A">The old debate</text>
  <g class="c-blue">
    <rect x="40" y="50" width="270" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="70" text-anchor="middle" dominant-baseline="central">Direct manipulation</text>
    <text class="ts" x="175" y="88" text-anchor="middle" dominant-baseline="central">Shneiderman, 1997</text>
  </g>
  <text class="ts" x="340" y="82" text-anchor="middle" dominant-baseline="central">vs</text>
  <g class="c-coral">
    <rect x="370" y="50" width="270" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="70" text-anchor="middle" dominant-baseline="central">Agent delegation</text>
    <text class="ts" x="505" y="88" text-anchor="middle" dominant-baseline="central">Maes, 1997</text>
  </g>
  <line x1="175" y1="106" x2="175" y2="140" class="arr" marker-end="url(#arrow)"/>
  <line x1="505" y1="106" x2="505" y2="140" class="arr" marker-end="url(#arrow)"/>
  <g class="c-gray">
    <rect x="60" y="144" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="ts" x="175" y="166" text-anchor="middle" dominant-baseline="central">Doesn't scale to complexity</text>
  </g>
  <g class="c-gray">
    <rect x="390" y="144" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="ts" x="505" y="166" text-anchor="middle" dominant-baseline="central">User loses control</text>
  </g>
  <line x1="175" y1="188" x2="290" y2="230" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="505" y1="188" x2="390" y2="230" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <g class="c-teal">
    <rect x="180" y="228" width="320" height="80" rx="12" stroke-width="0.5"/>
    <text class="th" x="340" y="256" text-anchor="middle" dominant-baseline="central">CAS resolution</text>
    <text class="ts" x="340" y="278" text-anchor="middle" dominant-baseline="central">Agents generate. Users manipulate.</text>
    <text class="ts" x="340" y="296" text-anchor="middle" dominant-baseline="central">Both were right — wrong dichotomy.</text>
  </g>
</svg>
